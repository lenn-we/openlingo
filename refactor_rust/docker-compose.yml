services:
  db:
    image: postgres:16-alpine
    container_name: lingo-refactor-postgres
    restart: unless-stopped
    ports:
      - "5438:5432"
    environment:
      POSTGRES_USER: lingo
      POSTGRES_PASSWORD: lingo_local_dev
      POSTGRES_DB: lingo_refactor
    volumes:
      - lingo_refactor_pgdata:/var/lib/postgresql/data

volumes:
  lingo_refactor_pgdata:
